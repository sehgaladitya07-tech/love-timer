<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Until We Meet ❤️</title>

<style>
body {
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
background:#000;
text-align:center;
}

/* USE IMG TAG INSTEAD OF BACKGROUND */
.photo img {
width:240px;
height:340px;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.4);
margin-bottom:20px;
}

h2 {font-size:22px;margin:10px 0;}
#timer {font-size:26px;}

.heart {
position:absolute;
bottom:-20px;
width:12px;height:12px;
background:red;
transform:rotate(45deg);
animation:float 6s linear infinite;
}

.heart:before,.heart:after {
content:"";
position:absolute;
width:12px;height:12px;
background:red;
border-radius:50%;
}

.heart:before {top:-6px;}
.heart:after {left:-6px;}

@keyframes float {
0% {transform:translateY(0) rotate(45deg);opacity:1;}
100% {transform:translateY(-100vh) rotate(45deg);opacity:0;}
}
</style>
</head>

<body>

<div class="photo">
<img src="photo.jpg" alt="photo">
</div>

<h2>❤️ Until we meet ❤️</h2>
<div id="timer"></div>

<script>
const target=new Date("April 4, 2026 12:30:00").getTime();

function update(){
let now=new Date().getTime();
let d=target-now;

if(d<=0){
timer.innerHTML="Finally together ❤️";
return;
}

let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d/(1000*60*60))%24);
let m=Math.floor((d/(1000*60))%60);
let s=Math.floor((d/1000)%60);

timer.innerHTML=days+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(update,1000);
update();

function heart(){
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}

setInterval(heart,300);
</script>

</body>
</html>
